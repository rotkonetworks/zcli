[package]
name = "license-server"
version = "0.1.0"
edition = "2021"
description = "ZEC-paid pro license server for zafu wallet"

[[bin]]
name = "license-server"
path = "src/main.rs"

[dependencies]
# http server
axum = "0.7"
tower-http = { version = "0.5", features = ["cors"] }
tokio = { version = "1", features = ["full"] }

# zidecar client + sync primitives
zecli = { path = "../zcli", features = ["cli"] }
zync-core = { path = "../../crates/zync-core", default-features = false }
orchard = { version = "0.12", default-features = false, features = ["circuit"] }
zcash_note_encryption = "0.4"

# crypto
ed25519-consensus = "2"
hex = "0.4"
sha2 = "0.10"

# serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bincode = "1.3"

# storage
sled = "0.34"

# cli + logging
clap = { version = "4", features = ["derive", "env"] }
dotenvy = "0.15"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
