# single-merchant zcash webshop
#
# zcli watch syncs the chain, matches payments, forwards to cold storage.
# caddy serves the checkout page and proxies API calls.
# api wraps zcli commands for dynamic payment request creation.
#
# usage:
#   cp .env.example .env   # edit with your values
#   docker compose up -d
#
# resource usage: ~50MB RAM, negligible CPU between syncs.
# a $5/mo hetzner CAX11 runs this easily.
#
# for multi-merchant (many shops on one VPS): use hwpay instead.
# hwpay does multi-tenant with a single zcash sync for all merchants.

services:
  zcli-watch:
    image: rust:1-slim
    volumes:
      - zcli-data:/root/.zcli
      - shop-data:/srv/shop/data
      - ./zcli:/usr/local/bin/zcli:ro
    environment:
      - ZCLI_IDENTITY=/root/.zcli/id_zcli
      - ZCLI_FORWARD=${FORWARD_ADDRESS:-}
      - ZCLI_WEBHOOK_URL=${WEBHOOK_URL:-}
      - ZCLI_WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
    command: >
      zcli merchant watch
        --dir /srv/shop/data
        --interval ${SYNC_INTERVAL:-300}
    restart: unless-stopped

  api:
    image: alpine:3
    volumes:
      - shop-data:/srv/shop/data
      - ./api.sh:/api.sh:ro
      - ./zcli:/usr/local/bin/zcli:ro
      - zcli-data:/root/.zcli
    environment:
      - API_PORT=8080
      - ZCLI_DIR=/srv/shop/data
      - ZCLI_IDENTITY=/root/.zcli/id_zcli
    command: /api.sh
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./index.html:/srv/shop/static/index.html:ro
      - ./qrcode.min.js:/srv/shop/static/qrcode.min.js:ro
      - shop-data:/srv/shop/data:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - SHOP_DOMAIN=${SHOP_DOMAIN:-localhost:8443}
    restart: unless-stopped

volumes:
  zcli-data:
  shop-data:
  caddy-data:
  caddy-config:
