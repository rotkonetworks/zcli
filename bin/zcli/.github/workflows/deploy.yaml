name: deploy zcli.rotko.net

on:
  push:
    branches: [main]
    paths: [www/**]
  workflow_dispatch:

env:
  CONTAINER_NAME: zcli-net
  CONTAINER_PORT: 55557
  PROJECT_DIR: www.zcli.rotko.net

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: upload site
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: www/*
          target: /home/${{ secrets.DEPLOY_USER }}/zcli-staging/
          strip_components: 0

      - name: deploy container
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.DEPLOY_USER }}

            mkdir -p ${{ env.PROJECT_DIR }}
            cp zcli-staging/www/index.html ${{ env.PROJECT_DIR }}/
            cp zcli-staging/www/memos.json ${{ env.PROJECT_DIR }}/

            cat > nginx-zcli.conf << 'NGINX_EOF'
            server {
                listen 80;
                server_name localhost;
                root /usr/share/nginx/html;
                index index.html;

                gzip on;
                gzip_vary on;
                gzip_min_length 256;
                gzip_types text/plain text/css application/json application/javascript text/xml;

                location = /memos.json {
                    add_header Cache-Control "no-cache";
                }

                location / {
                    try_files $uri $uri/ /index.html;
                }

                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            }
            NGINX_EOF

            podman stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            podman rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            podman run -d \
              --name ${{ env.CONTAINER_NAME }} \
              -p 127.0.0.1:${{ env.CONTAINER_PORT }}:80 \
              -v /home/${{ secrets.DEPLOY_USER }}/${{ env.PROJECT_DIR }}:/usr/share/nginx/html:ro,Z \
              -v /home/${{ secrets.DEPLOY_USER }}/nginx-zcli.conf:/etc/nginx/conf.d/default.conf:ro,Z \
              --restart unless-stopped \
              nginx:alpine

            sleep 2
            if ! podman ps | grep -q ${{ env.CONTAINER_NAME }}; then
              echo "container failed to start"
              podman logs ${{ env.CONTAINER_NAME }}
              exit 1
            fi

            curl -f http://127.0.0.1:${{ env.CONTAINER_PORT }}/ > /dev/null || {
              echo "site not responding"
              podman logs ${{ env.CONTAINER_NAME }}
              exit 1
            }

            rm -rf zcli-staging/
            echo "deployed zcli.rotko.net"
