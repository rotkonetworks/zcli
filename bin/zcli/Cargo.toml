[package]
name = "zecli"
version = "0.6.0"
edition = "2021"
license = "MIT"
description = "zcash wallet CLI - ssh keys as wallet seed, agent-friendly"
repository = "https://github.com/rotkonetworks/zcli"
keywords = ["zcash", "wallet", "cli", "privacy"]
categories = ["command-line-utilities", "cryptography::cryptocurrencies"]

[lib]
name = "zecli"
path = "src/lib.rs"

[[bin]]
name = "zcli"
path = "src/main.rs"
required-features = ["cli"]

[features]
default = ["cli"]
cli = [
    "dep:clap",
    "dep:ssh-key",
    "dep:tokio",
    "dep:reqwest",
    "dep:tonic",
    "dep:prost",
    "dep:rpassword",
    "dep:is-terminal",
    "dep:indicatif",
    "dep:qrcode",
    "dep:sled",
    "dep:quinn",
    "dep:rustls",
    "dep:rcgen",
    "dep:ring",
    "dep:urlencoding",
    "dep:zync-core",
    "dep:anyhow",
]

[dependencies]
# -- always available (pure crypto, wasm-safe) --

# bip39 mnemonic
bip39 = { version = "2.0", features = ["rand"] }

# orchard / zcash
orchard = { version = "0.12", default-features = false, features = ["circuit"] }
zcash_keys = { version = "0.12", default-features = false, features = ["orchard"] }
zcash_protocol = { version = "0.7", default-features = false }
zip32 = { version = "0.2", default-features = false }
zcash_address = "0.7"
zcash_note_encryption = "0.4"

# merkle tree witness construction
incrementalmerkletree = { version = "0.8", features = ["legacy-api"] }

# FROST threshold multisig (RedPallas, rerandomized)
# frost-spend wraps ZF's audited libraries for sighash-bound spend authorization.
# also re-exports reddsa FROST types for DKG and generic signing.
frost-spend = { path = "../../crates/frost-spend" }
reddsa = { git = "https://github.com/ZcashFoundation/reddsa.git", rev = "475a552", features = ["frost", "serde"] }
ed25519-consensus = "2"
rand_core = "0.6"

# transparent address crypto (secp256k1)
k256 = { version = "0.13", features = ["ecdsa-core", "ecdsa", "sha256"] }
hmac = "0.12"
sha2 = "0.10"
ripemd = "0.1"

# finite field traits (for pallas::Scalar::to_repr)
ff = "0.13"

# hashing
blake2 = "0.10"
blake2b_simd = "1.0"

# UR (Uniform Resources) decoding for zigner QR interop
ur = "0.4"

# serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# error handling
thiserror = "1.0"

# misc
hex = "0.4"
rand = "0.8"
zeroize = { version = "1", features = ["zeroize_derive"] }

# -- cli-only deps (not for wasm) --

clap = { version = "4", features = ["derive", "env"], optional = true }
ssh-key = { version = "0.6", features = ["encryption", "ed25519"], optional = true }
tokio = { version = "1", features = ["full"], optional = true }
prost = { version = "0.12", optional = true }
reqwest = { version = "0.12", features = ["rustls-tls", "http2"], default-features = false, optional = true }
tonic = { version = "0.11", default-features = false, features = ["codegen", "prost"], optional = true }
rpassword = { version = "7", optional = true }
is-terminal = { version = "0.4", optional = true }
indicatif = { version = "0.17", optional = true }
qrcode = { version = "0.14", optional = true }
sled = { version = "0.34", optional = true }
anyhow = { version = "1.0", optional = true }
zync-core = { version = "0.6.0", path = "../../crates/zync-core", default-features = false, optional = true }
quinn = { version = "0.11", optional = true }
rustls = { version = "0.23", default-features = false, features = ["ring", "std"], optional = true }
rcgen = { version = "0.13", features = ["ring"], optional = true }
ring = { version = "0.17", optional = true }
urlencoding = { version = "2", optional = true }

[build-dependencies]
tonic-build = "0.11"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
tempfile = "3"
