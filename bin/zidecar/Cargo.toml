[package]
name = "zidecar"
version = "0.6.0"
edition = "2021"
license = "MIT"
description = "Ligerito-powered Zcash light server with real-time header chain proofs"
repository = "https://github.com/rotkonetworks/zcli"
keywords = ["zcash", "ligerito", "light-server", "zk-proofs"]
categories = ["cryptography"]

[[bin]]
name = "zidecar"
path = "src/main.rs"

[dependencies]
# zync core types
zync-core = { version = "0.6.0", path = "../../crates/zync-core" }

# ligerito polynomial commitment scheme
ligerito = { version = "0.6.0", path = "../../crates/ligerito", features = ["transcript-blake2b"] }
ligerito-binary-fields = { version = "0.6.0", path = "../../crates/ligerito-binary-fields" }

# async runtime
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
futures = "0.3"

# gRPC (with web support for browser clients)
tonic = "0.11"
tonic-web = "0.11"
prost = "0.12"
prost-types = "0.12"

# zcash primitives (will add later when needed for tx building)
# zcash_primitives = { version = "0.13", features = ["transparent-inputs"] }
# zcash_client_backend = "0.11"
# orchard = "0.7"

# http client for zebrad RPC
reqwest = { version = "0.11", default-features = false, features = ["json", "rustls-tls"] }
serde_json = "1.0"

# storage (nomt for sparse merkle trees)
nomt = { version = "1.0", features = ["serde"] }
sled = "0.34"  # for simple proof cache

# crypto
blake2 = "0.10"
sha2 = "0.10"

# tower middleware
tower = { version = "0.4", features = ["retry", "timeout", "util", "buffer"] }
tower-http = { version = "0.4", features = ["trace"] }

# utilities
thiserror = "1.0"
anyhow = "1.0"
hex = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive", "env"] }
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"

[build-dependencies]
tonic-build = "0.11"

[dev-dependencies]
tempfile = "3"
