[package]
name = "zclid"
version = "0.6.0"
edition = "2021"
license = "MIT"
description = "background wallet daemon for zcli — keeps wallet synced, serves instant queries"

[[bin]]
name = "zclid"
path = "src/main.rs"

[dependencies]
# shared with zcli — reuse its orchard, wallet, client
zecli = { version = "0.6.0", path = "../zcli", features = ["cli"] }
zync-core = { version = "0.6.0", path = "../../crates/zync-core" }

# async
tokio = { version = "1", features = ["full"] }
tokio-stream = { version = "0.1", features = ["net"] }

# grpc
tonic = "0.11"
prost = "0.12"
http = "0.2"
tower = "0.4"

# orchard (same version as zecli)
orchard = { version = "0.12", default-features = false }
zip32 = "0.2"

# security
subtle = "2.5"      # constant-time comparisons
getrandom = "0.2"   # secure random without fd
libc = "0.2"        # disable core dumps

# utilities
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive", "env"] }
hex = "0.4"
anyhow = "1.0"

[build-dependencies]
tonic-build = "0.11"
