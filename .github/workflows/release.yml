name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            binary: zcli-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            binary: zcli-linux-arm64
          - target: aarch64-apple-darwin
            os: macos-14
            binary: zcli-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-13
            binary: zcli-macos-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.x'

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: build
        run: cargo build --release --target ${{ matrix.target }} -p zecli

      - name: package
        run: |
          cp target/${{ matrix.target }}/release/zcli ${{ matrix.binary }}
          strip ${{ matrix.binary }} 2>/dev/null || true
          sha256sum ${{ matrix.binary }} > ${{ matrix.binary }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: |
            ${{ matrix.binary }}
            ${{ matrix.binary }}.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zcli-linux-amd64
            zcli-linux-amd64.sha256
            zcli-linux-arm64
            zcli-linux-arm64.sha256
            zcli-macos-arm64
            zcli-macos-arm64.sha256
            zcli-macos-amd64
            zcli-macos-amd64.sha256
          generate_release_notes: true
