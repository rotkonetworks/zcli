name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            suffix: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            suffix: linux-arm64
          - target: aarch64-apple-darwin
            os: macos-14
            suffix: macos-arm64
          - target: x86_64-apple-darwin
            os: macos-14
            suffix: macos-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: install protoc (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: install protoc (macos)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: build
        run: |
          cargo build --release --target ${{ matrix.target }} -p zecli
          cargo build --release --target ${{ matrix.target }} -p zidecar
          cargo build --release --target ${{ matrix.target }} -p zclid
          cargo build --release --target ${{ matrix.target }} -p ligerito

      - name: package
        run: |
          for bin in zcli zidecar zclid ligerito; do
            name="${bin}-${{ matrix.suffix }}"
            cp "target/${{ matrix.target }}/release/${bin}" "${name}"
            strip "${name}" 2>/dev/null || true
          done

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: |
            zcli-${{ matrix.suffix }}
            zidecar-${{ matrix.suffix }}
            zclid-${{ matrix.suffix }}
            ligerito-${{ matrix.suffix }}

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: generate checksums
        run: sha256sum zcli-* zidecar-* zclid-* ligerito-* > SHA256SUMS

      - name: import gpg key
        if: env.GPG_PRIVATE_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: sign checksums
        if: env.GPG_PRIVATE_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          gpg --batch --yes --armor --detach-sign SHA256SUMS
          gpg --armor --export > rotko.asc

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zcli-*
            zidecar-*
            zclid-*
            ligerito-*
            SHA256SUMS
            SHA256SUMS.asc
            rotko.asc
          generate_release_notes: true
          body: |
            ## verify

            ```bash
            gpg --import rotko.asc
            gpg --verify SHA256SUMS.asc SHA256SUMS
            sha256sum -c SHA256SUMS --ignore-missing
            ```
